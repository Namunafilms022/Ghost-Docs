<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Docs Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.5;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem; }
    header {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;
      padding-bottom: 1rem; border-bottom: 1px solid #30363d;
    }
    header h1 { font-size: 1.5rem; color: #58a6ff; }
    header span { color: #8b949e; }
    .card {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 1.5rem; margin-bottom: 1rem;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #f0f6fc; }
    .card h2::before { content: '>'; color: #58a6ff; margin-right: 0.5rem; }
    input, textarea {
      width: 100%; padding: 0.6rem; margin-bottom: 0.75rem;
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font-size: 0.9rem;
    }
    input:focus, textarea:focus { outline: none; border-color: #58a6ff; }
    textarea { font-family: 'SF Mono', Monaco, monospace; font-size: 0.85rem; resize: vertical; min-height: 80px; }
    button {
      padding: 0.5rem 1.2rem; background: #238636; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem;
    }
    button:hover { background: #2ea043; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #f85149; padding: 0.5rem; background: #1c0d0f; border-radius: 6px; margin-top: 0.5rem; }
    .result { margin-top: 1rem; }
    .result h3 { color: #58a6ff; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .result pre {
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      padding: 1rem; overflow-x: auto; font-size: 0.8rem; white-space: pre-wrap;
    }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab {
      padding: 0.4rem 1rem; border: 1px solid #30363d; border-radius: 6px;
      cursor: pointer; font-size: 0.85rem; color: #8b949e;
    }
    .tab.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
    .status {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px;
      font-size: 0.75rem; font-weight: 600;
    }
    .status.online { background: #1b4a1b; color: #3fb950; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ghost-docs</h1>
      <span>AI Technical Writer</span>
      <span class="status online">● online</span>
    </header>

    <div class="tabs">
      <div class="tab active" data-tab="explain">Explain</div>
      <div class="tab" data-tab="reason">Reason</div>
      <div class="tab" data-tab="analyze">Analyze</div>
    </div>

    <div id="explain" class="tab-content">
      <div class="card">
        <h2>Explain Repository</h2>
        <input type="text" id="explainUrl" placeholder="Repository URL or local path (e.g., ./my-project or https://github.com/user/repo)">
        <button id="explainBtn">Generate Documentation</button>
        <div id="explainResult" class="result"></div>
      </div>
    </div>

    <div id="reason" class="tab-content" style="display:none">
      <div class="card">
        <h2>Ask About Repository</h2>
        <input type="text" id="reasonUrl" placeholder="Repository URL or local path">
        <input type="text" id="reasonQuestion" placeholder="Your question (e.g., How does auth work?)">
        <button id="reasonBtn">Ask</button>
        <div id="reasonResult" class="result"></div>
      </div>
    </div>

    <div id="analyze" class="tab-content" style="display:none">
      <div class="card">
        <h2>Quick Analysis</h2>
        <input type="text" id="analyzeUrl" placeholder="Repository URL or local path">
        <button id="analyzeBtn">Analyze</button>
        <div id="analyzeResult" class="result"></div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).style.display = 'block';
      });
    });

    async function callApi(endpoint, data) {
      const res = await fetch(`/api/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      return await res.json();
    }

    document.getElementById('explainBtn').addEventListener('click', async () => {
      const url = document.getElementById('explainUrl').value;
      if (!url) return;
      const btn = document.getElementById('explainBtn');
      const result = document.getElementById('explainResult');
      btn.disabled = true; result.innerHTML = '<p>Scanning...</p>';
      const res = await callApi('explain', { repoUrl: url });
      result.innerHTML = res.success
        ? `<h3>Result</h3><pre>${JSON.stringify(res.data, null, 2)}</pre>`
        : `<div class="error">${res.error}</div>`;
      btn.disabled = false;
    });

    document.getElementById('reasonBtn').addEventListener('click', async () => {
      const repoUrl = document.getElementById('reasonUrl').value;
      const question = document.getElementById('reasonQuestion').value;
      if (!repoUrl || !question) return;
      const btn = document.getElementById('reasonBtn');
      const result = document.getElementById('reasonResult');
      btn.disabled = true; result.innerHTML = '<p>Thinking...</p>';
      const res = await callApi('reason', { repoUrl, question });
      result.innerHTML = res.success
        ? `<h3>Answer</h3><pre>${res.data.answer}</pre><h3>Confidence</h3><pre>${res.data.confidence}</pre>`
        : `<div class="error">${res.error}</div>`;
      btn.disabled = false;
    });

    document.getElementById('analyzeBtn').addEventListener('click', async () => {
      const url = document.getElementById('analyzeUrl').value;
      if (!url) return;
      const btn = document.getElementById('analyzeBtn');
      const result = document.getElementById('analyzeResult');
      btn.disabled = true; result.innerHTML = '<p>Analyzing...</p>';
      const res = await callApi('analyze', { repoUrl: url });
      result.innerHTML = res.success
        ? `<h3>Summary</h3><pre>${JSON.stringify(res.data, null, 2)}</pre>`
        : `<div class="error">${res.error}</div>`;
      btn.disabled = false;
    });
  </script>
</body>
</html>
